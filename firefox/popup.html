<!DOCTYPE html>
<html>
<head>
  <title>Mondary News</title>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
    }
    .news-list {
      max-width: 800px;
      margin: 0 auto;
    }
    .news-item {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    .news-title {
      margin: 0 0 4px 0;
      font-size: 16px;
      color: #333;
    }
    .news-date {
      font-size: 12px;
      color: #666;
    }
    .loading {
      text-align: center;
      padding: 20px;
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="news-container" class="news-list">
    <div class="loading">Loading news...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
