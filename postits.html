<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Pinboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        #pinboard {
            position: absolute;
            width: 100vw;
            height: 100vh;
        }
        .note {
            position: absolute;
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            resize: both;
            overflow: auto;
            min-width: 30px;
            min-height: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;

        }
        .note-content {
            flex-grow: 1;
            flex: 1;
            min-height: 50px;
            height: 100%;
            border: none;
            background: transparent;
            outline: none;
            resize: none;
        }
        .note-result {
            color: #007BFF;
            margin-top: 5px;
            font-size: 14px;
            flex: 0 0 auto;
            min-height: 60px;
            margin-left: 10px;
            padding: 5px;
            border-left: 1px solid #ddd;
            text-align: right;
            white-space: pre; /* Preserve line breaks */
            overflow-y: auto;
        }
        .delete {
            position: absolute;
            top: 5px;
            right: 5px;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="pinboard"></div>
    <script>
        const pinboard = document.getElementById("pinboard");
        let highestZ = 1;

        // Create a new note
        function createNote(x, y, width = 200, height = 150, content = "") {
            const note = document.createElement("div");
            note.className = "note";
            note.style.left = `${Math.max(0, Math.min(x, window.innerWidth - width))}px`;
            note.style.top = `${Math.max(0, Math.min(y, window.innerHeight - height))}px`;
            note.style.width = `${width}px`;
            note.style.height = `${height}px`;
            note.style.zIndex = highestZ++;
            
            // Create textarea for note content
            const textArea = document.createElement("textarea");
            textArea.className = "note-content";
            textArea.value = content;
            textArea.oninput = () => {
                updateCalculation(textArea, resultDiv);
                saveNotes();
            };
            
            // Create result display for calculations
            const resultDiv = document.createElement("div");
            resultDiv.className = "note-result";
            
            // Create delete button
            const deleteBtn = document.createElement("button");
            deleteBtn.className = "delete";
            deleteBtn.innerText = "×";
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                note.remove();
                saveNotes();
            };
            
            // Assemble note components
            note.append(deleteBtn, textArea, resultDiv);
            pinboard.appendChild(note);
            updateCalculation(textArea, resultDiv);

            // Set up dragging functionality
            setupDragging(note, textArea, deleteBtn, resultDiv);
            
            // Set up resize observer
        const resizeObserver = new ResizeObserver(() => {
            saveNotes();
        });
        resizeObserver.observe(note);

            textArea.focus();
            saveNotes();

            // Add click handler to bring note to front
            note.addEventListener('click', () => {
                note.style.zIndex = highestZ++;
            });
        }

        // Set up dragging for a note
        function setupDragging(note, textArea, deleteBtn, resultDiv) {
            let isDragging = false;
            let currentX, currentY;

            note.addEventListener('mousedown', e => {
                if (e.target === textArea || e.target === deleteBtn || e.target === resultDiv) return;
                
                const offsetX = e.clientX - note.offsetLeft;
                const offsetY = e.clientY - note.offsetTop;
                const edgeThreshold = 10;
                
                // Skip dragging if near edge (resize handle area)
                if (offsetX > note.offsetWidth - edgeThreshold || offsetY > note.offsetHeight - edgeThreshold) return;
                
                isDragging = true;
                note.style.zIndex = highestZ++;
                currentX = offsetX;
                currentY = offsetY;
                e.preventDefault();
            });

            document.addEventListener('mousemove', e => {
                if (!isDragging) return;
                note.style.left = `${Math.max(0, Math.min(e.clientX - currentX, window.innerWidth - note.offsetWidth))}px`;
                note.style.top = `${Math.max(0, Math.min(e.clientY - currentY, window.innerHeight - note.offsetHeight))}px`;
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    saveNotes();
                }
            });
        }

        // Update calculation result if content is a math expression
        function updateCalculation(textArea, resultDiv) {
            const content = textArea.value.trim();
            try {
                // Process each line individually
                const results = content.split('\n').map(line => {
                    const trimmedLine = line.trim();
                    // Replace 'x' with '*' for multiplication and check if it's a valid math expression
                    const processedLine = trimmedLine.replace(/x/g, '*');
                    if (/^[0-9+\-*/().= ]+$/.test(processedLine)) {
                        return `= ${eval(processedLine)}`;
                    }
                    return '';
                });
                resultDiv.innerText = results.join('\n');
            } catch (e) {
                resultDiv.innerText = '';
            }
        }

        // Save notes to localStorage
        function saveNotes() {
            const notes = Array.from(document.querySelectorAll(".note")).map(note => {
                const textArea = note.querySelector(".note-content");
                return {
                    x: note.offsetLeft,
                    y: note.offsetTop,
                    width: note.offsetWidth,
                    height: note.offsetHeight,
                    content: textArea.value,
                    zIndex: note.style.zIndex
                };
            });
            localStorage.setItem("notes", JSON.stringify(notes));
        }

        // Load notes from localStorage
        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem("notes")) || [];
            notes.forEach(n => {
                createNote(n.x, n.y, n.width, n.height, n.content);
                document.querySelector(".note:last-child").style.zIndex = n.zIndex;
                highestZ = Math.max(highestZ, parseInt(n.zIndex) + 1);
            });
        }

        // Create a new note on right-click
        pinboard.addEventListener("contextmenu", e => {
            e.preventDefault();
            createNote(e.clientX, e.clientY);
        });

        // Load notes when page loads
        window.onload = loadNotes;
    </script>
</body>
</html>
